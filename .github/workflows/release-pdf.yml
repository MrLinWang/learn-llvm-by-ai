name: Generate and Release PDF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-xetex
      
      - name: Generate PDF
        run: python3 .trae/config/generate_pdf.py
      
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --notes "Auto-generated PDF from tutorial content" \
            output/learn-llvm-tutorial.pdf
      
      - name: Upload PDF as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: learn-llvm-tutorial-pdf
          path: output/learn-llvm-tutorial.pdf
          retention-days: 30
