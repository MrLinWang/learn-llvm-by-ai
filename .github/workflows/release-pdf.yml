name: Generate and Release PDF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-xetex
      
      - name: Generate PDF
        run: python3 .trae/config/generate_pdf.py
      
      - name: Upload PDF to Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/learn-llvm-tutorial.pdf
          body: "Auto-generated PDF from tutorial content"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload PDF as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: learn-llvm-tutorial-pdf
          path: output/learn-llvm-tutorial.pdf
          retention-days: 30
